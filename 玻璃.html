<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>古月ai智能体·玻璃商业门头灵感库（左右中英文对照版）（白天/夜景模式）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
  min-height:100vh;
  padding:20px 0 60px;
  color:#fff;
}
.header{
  text-align:center;
  padding:40px 20px;
  margin-bottom:30px;
}
.header h1{font-size:28px;margin-bottom:8px;}
.header p{font-size:15px;opacity:0.8;}
.input-wrap{
  max-width:800px;
  margin:0 auto 30px;
  background:#1E293B;
  padding:30px;
  border-radius:16px;
}
.input-box, select{
  width:100%;
  padding:15px 20px;
  font-size:16px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}
.gen-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#0284C7,#38BDF8);
  color:#fff;
  font-size:17px;
  font-weight:500;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result-wrap{
  max-width:800px;
  margin:0 auto;
  padding:0 20px;
}
.result-item{
  background:#1F2937;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:15px;
}
.item-text{
  flex:1;
  font-size:14px;
  line-height:1.6;
}
.copy-btn{
  padding:8px 12px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.copy-btn:hover{background:#0369A1;}
.copy-btn.copied{
  background:#CCCCCC !important;
  color:#666 !important;
  cursor:default !important;
}
.copy-all-btn{
  display:block;
  margin:20px auto 0;
  padding:12px 24px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
.copy-all-btn:hover{background:#0369A1;}
</style>
</head>
<body>

<div class="header">
<h1>🪟 古月ai智能体·玻璃商业门头灵感库（左右中英文对照版）</h1>
<p>店铺正立面完全展示 | 8K写实 | 智能体科技感底图 | 白天/夜景模式</p>
</div>

<div class="input-wrap">
<input type="text" id="industryInput" class="input-box" placeholder="请输入店铺行业，例如：珠宝首饰、眼镜、美妆集合">
<select id="modeSelect" class="input-box">
  <option value="白天自然光">白天自然光</option>
  <option value="夜景灯光效果">夜景灯光效果</option>
</select>
<button class="gen-btn" onclick="generatePrompts()">🚀 生成20组提示词</button>
</div>

<div class="result-wrap" id="resultWrap"></div>

<script>
// 固定20组提示词文本
const promptTemplates = [
  "珠宝首饰店铺门头，玻璃橱窗明亮通透，钢化玻璃+金属字，现代简洁风格",
  "眼镜配镜店铺门头设计，玻璃展示柜清晰明亮，正面平视视角",
  "美妆集合店铺门头，通透明亮玻璃橱窗，简约现代风格",
  "轻奢服饰店铺外立面，玻璃门头+橱窗设计，正面无遮挡",
  "甜品饮品店铺门头，玻璃橱窗展示，明亮清晰可施工",
  "数码体验店铺外立面，玻璃门头通透，正面视角8K写实",
  "珠宝首饰店铺玻璃门头设计，简洁明亮，现代商业风格",
  "眼镜配镜店铺门头，玻璃橱窗通透明亮，施工级参考",
  "美妆集合店铺门头，玻璃展示柜清晰通透，现代简约风格",
  "轻奢服饰店铺门头，玻璃门头明亮，正面视角8K高清",
  "甜品饮品店铺门头，玻璃橱窗+金属字，现代简洁风格",
  "数码体验店铺外立面，玻璃门头清晰明亮，正面平视视角",
  "珠宝首饰店铺门头，玻璃+金属字组合，明亮清晰，施工级参考",
  "眼镜配镜店铺门头，玻璃通透明亮，现代风格，商业写实",
  "美妆集合店铺外立面，玻璃橱窗设计，清晰通透，施工级效果",
  "轻奢服饰店铺门头，玻璃门头明亮，正面视角8K写实",
  "甜品饮品店铺门头，玻璃橱窗通透明亮，现代设计风格",
  "数码体验店铺门头，玻璃橱窗清晰通透，正面视角8K高清",
  "珠宝首饰店铺门头，玻璃+金属字组合，明亮通透，施工参考",
  "眼镜配镜店铺门头，玻璃橱窗清晰明亮，现代风格，施工级参考"
];

// 生成对应英文
const promptEn = [
  "Jewelry store storefront, glass showcase bright and transparent, tempered glass with metal letters, modern minimalist style",
  "Optical store storefront design, glass display clear and bright, frontal view",
  "Beauty collection store storefront, bright transparent glass showcase, simple modern style",
  "Luxury fashion store exterior, glass facade with showcase design, unobstructed frontal view",
  "Dessert & beverage store storefront, glass showcase display, bright clear, construction reference",
  "Digital experience store exterior, transparent glass facade, frontal 8K realistic render",
  "Jewelry store glass facade design, simple bright, modern commercial style",
  "Optical store storefront, glass showcase bright and transparent, construction-grade reference",
  "Beauty collection store storefront, glass display clear and transparent, modern minimalist style",
  "Luxury fashion store storefront, glass facade bright, frontal 8K high resolution",
  "Dessert & beverage store storefront, glass showcase with metal letters, modern minimalist style",
  "Digital experience store exterior, glass facade clear and bright, frontal view",
  "Jewelry store storefront, glass + metal letters, bright and clear, construction-grade reference",
  "Optical store storefront, transparent glass, modern style, commercial realistic render",
  "Beauty collection store exterior, glass showcase design, clear and transparent, construction-grade render",
  "Luxury fashion store storefront, glass facade bright, frontal 8K realistic render",
  "Dessert & beverage store storefront, glass showcase transparent bright, modern design style",
  "Digital experience store storefront, glass showcase clear and transparent, frontal 8K high-res",
  "Jewelry store storefront, glass + metal letters combination, bright and transparent, construction reference",
  "Optical store storefront, glass showcase clear and bright, modern style, construction-grade reference"
];

function copySingle(text,btn){
navigator.clipboard.writeText(text).then(()=>{btn.classList.add("copied");btn.innerText="已复制";});
}

function copyAll(){
let allText="";
promptTemplates.forEach((p,i)=>{allText+=`${i+1}. 中文: ${p}\n英文: ${promptEn[i]}\n\n`;});
navigator.clipboard.writeText(allText).then(()=>alert("✅ 已成功复制全部20组提示词！"));
}

function generatePrompts(){
const industry = document.getElementById("industryInput").value.trim();
const mode = document.getElementById("modeSelect").value;
if(!industry){alert("请输入店铺行业"); return;}
const resultWrap=document.getElementById("resultWrap");
resultWrap.innerHTML="";
promptTemplates.forEach((p,i)=>{
let zh = `${mode}，店铺正立面完全展示，${p.replace(/店铺/g, industry+'店铺')}`;
let en = `${mode==="白天自然光"?"Daylight":"Night lighting"}, full front view of the store, ${promptEn[i].replace(/store/g, industry+" store")}`;
resultWrap.innerHTML+=`
<div class="result-item">
  <div class="item-text">
    <div><b>第${i+1}组</b></div>
    <div>中文: ${zh}</div>
    <div>英文: ${en}</div>
  </div>
  <button class="copy-btn" onclick="copySingle('中文: ${zh}\\n英文: ${en}',this)">复制</button>
</div>`;
});
resultWrap.innerHTML+=`<button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部20组</button>`;
}
</script>
</body>
</html>
