<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>古月·玻璃商业门头双语提示词生成器（每组不同 + LOGO）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
  min-height:100vh;
  padding:20px 0 60px;
  color:#fff;
}
.header{
  text-align:center;
  padding:40px 20px;
  margin-bottom:30px;
}
.header h1{font-size:28px;margin-bottom:8px;}
.header p{font-size:15px;opacity:0.8;}
.input-wrap{
  max-width:800px;
  margin:0 auto 30px;
  background:#1E293B;
  padding:30px;
  border-radius:16px;
}
.input-box, select{
  width:100%;
  padding:15px 20px;
  font-size:16px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}
.gen-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#0284C7,#38BDF8);
  color:#fff;
  font-size:17px;
  font-weight:500;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result-wrap{
  max-width:800px;
  margin:0 auto;
  padding:0 20px;
}
.result-item{
  background:#1F2937;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  gap:15px;
  align-items:flex-start;
}
.item-col{flex:1;}
.item-text{font-size:14px;line-height:1.6;}
.copy-btn{
  margin-top:8px;
  padding:6px 12px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.copy-btn:hover{background:#0369A1;}
.copy-btn.copied{
  background:#CCCCCC !important;
  color:#666 !important;
  cursor:default !important;
}
.copy-all-btn{
  display:block;
  margin:20px auto 0;
  padding:12px 24px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
.copy-all-btn:hover{background:#0369A1;}
</style>
</head>
<body>

<div class="header">
<h1>🪟 古月·玻璃商业门头双语提示词生成器</h1>
<p>店铺正立面完全展示 | 包含LOGO | 8K写实 | 智能体科技感底图 | 白天/夜景模式</p>
</div>

<div class="input-wrap">
<input type="text" id="industryInput" class="input-box" placeholder="请输入店铺行业，例如：珠宝首饰、眼镜、美妆集合">
<select id="modeSelect" class="input-box">
  <option value="白天自然光">白天自然光</option>
  <option value="夜景灯光效果">夜景灯光效果</option>
</select>
<button class="gen-btn" onclick="generatePrompts()">🚀 生成20组提示词</button>
</div>

<div class="result-wrap" id="resultWrap"></div>

<script>
// 可随机选择的风格、灯光、LOGO表现方式
const styles = ["现代极简","高端质感","商业旗舰风格","建筑感强化","设计师定制风格","未来科技感","透明通透感","艺术展示风格"];
const lightings = ["自然光照射","隐藏灯带光效","立体背光LOGO","柔光洗墙灯","霓虹灯条点缀"];
const logoStyles = ["LOGO浮雕金属质感","LOGO发光效果","LOGO背光设计","LOGO镂空立体感","LOGO玻璃贴膜效果"];

// 生成不重复随机数字
function uniqueRandoms(count, max){
  const set = new Set();
  while(set.size < count){
    set.add(Math.floor(Math.random()*max));
  }
  return Array.from(set);
}

function generatePrompts(){
  const industry = document.getElementById("industryInput").value.trim();
  const mode = document.getElementById("modeSelect").value;
  if(!industry){alert("请输入店铺行业"); return;}
  
  const resultWrap = document.getElementById("resultWrap");
  resultWrap.innerHTML = "";
  
  let allPrompts = [];
  
  const styleIndex = uniqueRandoms(20, styles.length);
  const lightIndex = uniqueRandoms(20, lightings.length);
  const logoIndex = uniqueRandoms(20, logoStyles.length);

  for(let i=0;i<20;i++){
    const storeName = `${industry}店铺${i+1}`;
    const zh = `${mode}，店铺正立面完全展示，${storeName}玻璃门头，${styles[styleIndex[i]]}，${lightings[lightIndex[i]]}，${logoStyles[logoIndex[i]]}，通透明亮，现代简洁，可施工参考`;
    const enMode = mode==="白天自然光"?"Daylight":"Night lighting";
    const en = `${enMode}, full front view of ${storeName} glass storefront, ${styles[styleIndex[i]]}, ${lightings[lightIndex[i]]}, ${logoStyles[logoIndex[i]]}, bright and transparent, modern minimalist style, construction reference`;
    
    allPrompts.push({zh,en});

    resultWrap.innerHTML += `
    <div class="result-item">
      <div class="item-col">
        <div class="item-text"><b>第${i+1}组 中文</b><br>${zh}</div>
        <button class="copy-btn" onclick="copySingle('${zh.replace(/'/g,"\\'")}',this)">复制中文</button>
      </div>
      <div class="item-col">
        <div class="item-text"><b>第${i+1}组 English</b><br>${en}</div>
        <button class="copy-btn" onclick="copySingle('${en.replace(/'/g,"\\'")}',this)">Copy English</button>
      </div>
    </div>`;
  }

  resultWrap.innerHTML += `<button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部20组</button>`;
  
  window.allPrompts = allPrompts;
}

// 单条复制
function copySingle(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    btn.innerText = btn.innerText.includes("中文")?"已复制":"Copied";
  });
}

// 一键复制全部
function copyAll(){
  let allText = "";
  window.allPrompts.forEach((p,i)=>{
    allText += `第${i+1}组 中文: ${p.zh}\n英文: ${p.en}\n\n`;
  });
  navigator.clipboard.writeText(allText).then(()=>alert("✅ 已成功复制全部20组提示词！"));
}
</script>

</body>
</html>
