<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>古月·玻璃商业门头双语提示词生成器（行业自动命名 + LOGO）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
  min-height:100vh;
  padding:20px 0 60px;
  color:#fff;
}
.header{
  text-align:center;
  padding:40px 20px;
  margin-bottom:30px;
}
.header h1{font-size:28px;margin-bottom:8px;}
.header p{font-size:15px;opacity:0.8;}
.input-wrap{
  max-width:800px;
  margin:0 auto 30px;
  background:#1E293B;
  padding:30px;
  border-radius:16px;
}
.input-box, select{
  width:100%;
  padding:15px 20px;
  font-size:16px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}
.gen-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#0284C7,#38BDF8);
  color:#fff;
  font-size:17px;
  font-weight:500;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result-wrap{
  max-width:800px;
  margin:0 auto;
  padding:0 20px;
}
.result-item{
  background:#1F2937;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  gap:15px;
  align-items:flex-start;
}
.item-col{flex:1;}
.item-text{font-size:14px;line-height:1.6;}
.copy-btn{
  margin-top:8px;
  padding:6px 12px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.copy-btn:hover{background:#0369A1;}
.copy-btn.copied{
  background:#CCCCCC !important;
  color:#666 !important;
  cursor:default !important;
}
.copy-all-btn{
  display:block;
  margin:20px auto 0;
  padding:12px 24px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
.copy-all-btn:hover{background:#0369A1;}
</style>
</head>
<body>

<div class="header">
<h1>🪟 古月·玻璃商业门头双语提示词生成器</h1>
<p>店铺正立面完全展示 | 包含LOGO | 8K写实 | 智能体科技感底图 | 白天/夜景模式</p>
</div>

<div class="input-wrap">
<input type="text" id="industryInput" class="input-box" placeholder="请输入店铺行业，例如：珠宝首饰、眼镜、美妆集合">
<select id="modeSelect" class="input-box">
  <option value="白天自然光">白天自然光</option>
  <option value="夜景灯光效果">夜景灯光效果</option>
</select>
<button class="gen-btn" onclick="generatePrompts()">🚀 生成20组提示词</button>
</div>

<div class="result-wrap" id="resultWrap"></div>

<script>
// 生成20个不同店铺名称
function generateStoreNames(industry){
  const suffixes = [
    "旗舰店","体验馆","专卖店","精品店","概念店",
    "主题店","展厅","快闪店","品牌店","形象店",
    "专营店","分店","总店","直销店","形象旗舰",
    "店铺A","店铺B","店铺C","店铺D","精品体验店"
  ];
  return suffixes.map(suffix => `${industry}${suffix}`);
}

// 生成中文和英文提示词，包含LOGO
function generatePrompts(){
  const industry = document.getElementById("industryInput").value.trim();
  const mode = document.getElementById("modeSelect").value;
  if(!industry){alert("请输入店铺行业"); return;}
  
  const resultWrap = document.getElementById("resultWrap");
  resultWrap.innerHTML = "";
  
  const storeNames = generateStoreNames(industry);
  const allPrompts = [];

  storeNames.forEach((name,i)=>{
    const zh = `${mode}，店铺正立面完全展示，包含LOGO，${name}玻璃门头，通透明亮，现代简洁风格，可施工参考`;
    const enMode = mode==="白天自然光"?"Daylight":"Night lighting";
    const en = `${enMode}, full front view of the store, including LOGO, ${name} glass storefront, bright and transparent, modern minimalist style, construction reference`;

    allPrompts.push({zh,en});

    resultWrap.innerHTML += `
    <div class="result-item">
      <div class="item-col">
        <div class="item-text"><b>第${i+1}组 中文</b><br>${zh}</div>
        <button class="copy-btn" onclick="copySingle('${zh.replace(/'/g,"\\'")}',this)">复制中文</button>
      </div>
      <div class="item-col">
        <div class="item-text"><b>第${i+1}组 English</b><br>${en}</div>
        <button class="copy-btn" onclick="copySingle('${en.replace(/'/g,"\\'")}',this)">Copy English</button>
      </div>
    </div>`;
  });

  resultWrap.innerHTML += `<button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部20组</button>`;

  window.allPrompts = allPrompts;
}

// 单条复制
function copySingle(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    btn.innerText = btn.innerText.includes("中文")?"已复制":"Copied";
  });
}

// 一键复制全部
function copyAll(){
  let allText = "";
  window.allPrompts.forEach((p,i)=>{
    allText += `第${i+1}组 中文: ${p.zh}\n英文: ${p.en}\n\n`;
  });
  navigator.clipboard.writeText(allText).then(()=>alert("✅ 已成功复制全部20组提示词！"));
}
</script>

</body>
</html>
