<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
  min-height:100vh;
  padding:20px 0 60px;
  color:#fff;
}
.header{
  text-align:center;
  padding:40px 20px;
  margin-bottom:30px;
}
.header h1{font-size:28px;margin-bottom:8px;}
.header p{font-size:15px;opacity:0.8;}
.input-wrap{
  max-width:800px;
  margin:0 auto 30px;
  background:#1E293B;
  padding:30px;
  border-radius:16px;
}
.input-box{
  width:100%;
  padding:15px 20px;
  font-size:16px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}
.gen-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#0284C7,#38BDF8);
  color:#fff;
  font-size:17px;
  font-weight:500;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.result-wrap{
  max-width:800px;
  margin:0 auto;
  padding:0 20px;
}
.result-item{
  background:#1F2937;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:15px;
}
.item-text{
  flex:1;
  font-size:14px;
  line-height:1.6;
}
.copy-btn{
  padding:8px 12px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}
.copy-btn:hover{background:#0369A1;}
.copy-btn.copied{
  background:#CCCCCC !important;
  color:#666 !important;
  cursor:default !important;
}
.copy-all-btn{
  display:block;
  margin:20px auto 0;
  padding:12px 24px;
  background:#0284C7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
.copy-all-btn:hover{background:#0369A1;}
</style>
</head>

function copySingle(text,btn){
navigator.clipboard.writeText(text).then(()=>{btn.classList.add("copied");btn.innerText="已复制";});
}

function copyAll(){
let allText="";
prompts.forEach((p,i)=>{allText+=`${i+1}. 中文: ${p.zh}\n英文: ${p.en}\n\n`;});
navigator.clipboard.writeText(allText).then(()=>alert("✅ 已成功复制全部20组提示词！"));
}

function generatePrompts(){
const resultWrap=document.getElementById("resultWrap");
resultWrap.innerHTML="";
prompts.forEach((p,i)=>{
resultWrap.innerHTML+=`
<div class="result-item">
  <div class="item-text">
    <div><b>第${i+1}组</b></div>
    <div>中文: ${p.zh}</div>
    <div>英文: ${p.en}</div>
  </div>
  <button class="copy-btn" onclick="copySingle('中文: ${p.zh}\\n英文: ${p.en}',this)">复制</button>
</div>
`;
});
resultWrap.innerHTML+=`<button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部20组</button>`;
}
</script>
